    const seenValues = points.map(p => p.seen);
    const minSeen = Math.min(1, ...seenValues);
    const maxSeen = Math.max(1, ...seenValues);
    const logMin = Math.log(minSeen);
    const logSpan = Math.max(Math.log(maxSeen) - logMin, 1e-9);

    
    const norm = seen => (Math.log(Math.max(seen, 1)) - logMin) / logSpan;
    const radius = seen => 4 + norm(seen) * 22;
    const color = seen => `hsl(${210 - norm(seen) * 210}, 85%, 55%)`;

    const esc = s => String(s ?? "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

    for (const p of points) {
